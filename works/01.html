<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《七八奇事》</title>
    <link rel="shortcut icon" href="../images/miracle.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/main.css">
    <style>
        #info {
            height: 65vh;
            width: 100vw;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: solid #000 1px;
        }

        #imgs {
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            overflow: auto;
        }

        #imgs img {
            height: 80%;
            border: #000 solid 1px;
        }

        #text {
            padding: 1em;
            height: calc(65vh - 2em);
            font-size: 1.5em;
            line-height: calc(65vh / 9);
            border-left: #000 solid 1px;
            overflow: auto;
        }

        @media screen and (max-width: 450px){
            #text {
                font-size: 1em;
                line-height: normalS;
            }
        }
        
        #sale {
            display: flex;
            height: calc(35vh - 1px);
            width: 100vw;
        }

        #sale .i {
            padding: 1em;
            height: calc(100% - 2em);
            width: calc(90vw - 2em);
            border-right: #000 solid 1px;
            font-size: 1.2em;
            overflow: auto;
        }

        #sale .s {
            display: flex;
            height: 100%;
            font-size: 2em;
            justify-content: center;
            align-items: center;
        }

        #sale .s text {
            width: 100%;
            text-align: center;
        }

        #back {
            position: fixed;
            top: .2rem;
            right: .2rem;
            height: 60px;
            width: 60px;
            font-size: 1.5em;
            text-align: center;
            line-height: 100px;
        }

        #back :hover {
            background-color: #f1f3f4;
        }

        #back :active {
            background-color: #808080;
        }

        #window {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            width: 100%;
            height: 100%;
        }

        #window .bg {
            width: 100%;
            height: 100%;
            background-color: rgb(0, 0, 0, 50%);
        }

        #window .win {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
        }

        #window .win img {
            height: 100%;
        }

        .win .shut {
            padding: 0.5em;
            position: absolute;
            top: 2em;
            right: 2em;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="main">
        <div id="info">
            <div id="imgs">
                <img src="../images/《七八奇事》图片1.jpg" alt="《七八奇事》" onclick="show(0)" />
                <img src="../images/《七八奇事》图片2.jpg" alt="《七八奇事》" onclick="show(1)" />
            </div>
            <div id="text">
                书名：七八奇事<br />
                体裁：纪实书<br />
                出品：奇迹工作室（灯塔、善君 著）<br />
                审核：灯火（内容）、灯塔（排版）<br />
                印刷：韩少（奇迹工作室印刷室）<br />
                规格：A6（74mm*105mm）<br />
                书籍编码：QJ-B-01-3243<br />
            </div>
        </div>
        <div id="sale">
            <div class="i">
                <h2>书籍介绍</h2>
                《七八奇事》是一部由灯塔、善君编写的用简化文体记录的纪实书，主要记录的是七年级八班（当时作者所在的班级）的奇闻轶事，并且语言生动、层出乐点，读之令人忍俊不禁。这是本工作室出版印刷的第一部书籍。
            </div>
            <div class="s">
                <text>已停止售卖</text>
            </div>
        </div>
        <div id="back"><a href="../works.html"><img src="../images/back.svg" alt=""></a></div>
    </div>
    <div id="window">
        <div class="bg" onclick="shut()"></div>
        <div class="win">
            <img src="../images/《七八奇事》图片1.jpg" alt="" />
        </div>
        <div class="win">
            <img src="../images/《七八奇事》图片2.jpg" alt="">
        </div>
    </div>

    <script>
        function show(n) {
            var win = document.getElementById("window");
            var wins = document.getElementsByClassName("win");
            win.style.display = "block";
            wins[n].style.display = "block";
            for (var i = 0; i < wins.length; i++) {
                if (i == n) {
                    continue;
                } else {
                    wins[i].style.display = "none";
                }
            }
        }

        function shut() {
            document.getElementById("window").style.display = "none";
        }
    </script>
</body>

</html>
