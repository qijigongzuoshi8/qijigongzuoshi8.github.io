<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇迹工作室</title>
    <link rel="icon" href="images/miracle-nobg.ico">
    <link rel="stylesheet" href="style/main.css">
    <style>
        nav a:nth-child(3) {
            background-color: white;
            border-bottom: 1px solid #000;
            border-top: 1px solid #000;
            border-right: 1px solid snow;
        }

        nav a:nth-child(3) {
            color: #000;
        }

        #main {
            overflow: auto;
        }

        #zs,
        #xr {
            width: 100%;
            margin-bottom: 2em;
        }

        .details {
            margin-top: 3em;
            border-radius: 1em;
            padding: 2em;
            border: #000 solid 1px;
            width: 80%;
            margin-left: 10%;
            margin-right: 10%;
            transition: background-color .2s linear;
        }

        .details:hover {
            background-color: #f1f3f4;
        }

        .details>h2 {
            display: inline-block;
        }

        .introductions {
            float: right;
            text-decoration: underline;
            font-family: 宋体;
            font-size: 1.5em;
        }

        .introductions:hover {
            font-weight: bold;
        }

        #window {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
            width: 100%;
            height: 100%;
        }

        #window .bg {
            width: 100%;
            height: 100%;
            background-color: rgb(0, 0, 0, 50%);
        }

        #window .win {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 70%;
            padding:2em;
            background-color: #fffafa;
            border-radius: 3em;
        }

        .win .shut {
            padding: 0.5em;
            position: absolute;
            top: 2em;
            right: 2em;
            font-weight: bold;
        }

        .win .shut:hover {
            background-color: #f1f3f4;
        }

        .win .shut:active {
            background-color: #808080;
            color: #fff;
        }

        .win .zhiwei{
            font-family: 黑体;
            font-weight: bold;
        }

        .win .content {
            font-family: 宋体;
        }
    </style>
</head>

<body>
    <header>
        <img src="images/miracle-nobg.ico">
        <h1 style="display: inline-block;">奇迹工作室&nbsp;<wbr />Miracle&nbsp;Studio</h1>
    </header>
    <div id="content">
        <nav>
            <a href="index.html">首页</a>
            <a href="info.html">概述</a>
            <a href="charactors.html">成员</a>
            <a href="works.html">作品</a>
            <a href="activities.html">动态</a>
            <a href="others.html">其他</a>
        </nav>
        <div id="main">
            <h1>成员</h1>

            <div id="zs">
                <h2>正式成员</h2>
                <div class="details">
                    <h2>灯塔</h2>
                    <span class="introductions" onclick="show(0)">介绍</span>
                </div>
                <div class="details">
                    <h2>善君</h2>
                    <span class="introductions" onclick="show(1)">介绍</span>
                </div>
                <div class="details">
                    <h2>灯火</h2>
                </div>
            </div>
            <div id="xr">
                <h2>信任人员</h2>
                <div class="details">
                    <h2>随性</h2>
                </div>
                <div class="details">
                    <h2>韩少</h2>
                </div>
            </div>
        </div>
        <div id="window">
            <div class="bg" onclick="shut()"></div>
            <div class="win">
                <h1>灯塔</h1>
                <div class="shut" onclick="shut()">X</div>
                <div class="zhiwei">
                    主任
                </div>
                <div class="content">
                    灯塔，本姓谢，2012年出生于山东青岛，原籍陕西渭南。2024年9月进入初中，并在同年10月在善君的协助下创建奇迹工作室，成为奇迹工作室创始人。同年11月，为善君颁发临时聘书，聘其为临时编写员。同年9月至次年1月，于善君共同完成奇迹工作室第一部书籍《七八奇事》，并使其成为灯塔代表作。
                </div>
            </div>
            <div class="win">
                <h1>善君</h1>
            </div>
        </div>
    </div>
    <script>
        function show(n){
            var win = document.getElementById("window");
            var wins = document.getElementsByClassName("win");
            win.style.display = "block";
            wins[n].style.display = "block";
            for (var i = 0; i < wins.length; i++){
                if (i == n){
                    continue;
                } else {
                    wins[i].style.display = "none";
                }
            }
        }

        function shut(){
            document.getElementById("window").style.display = "none";
        }
    </script>
</body>

</html>
