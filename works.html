<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奇迹工作室</title>
    <link rel="icon" href="images/miracle-nobg.ico">
    <link rel="stylesheet" href="style/main.css">
    <style>
        nav a:nth-child(4){
            background-color: white;
            border-bottom: 1px solid #000;
            border-top: 1px solid #000;
            border-right: 1px solid snow;
        }

        nav a:nth-child(4) {
            color: #000;
        }

        #main {
            overflow: auto; 
        }

        .details {
            margin-top: 3em;
            border-radius: 1em;
            padding: 2em;
            border: #000 solid 1px;
            width: calc(80% - 4em - 2px);
            margin-left: 10%;
            margin-right: 10%;
            transition: background-color .2s linear;
        }

        .details:hover {
            background-color: #f0f0f0;
        }

        .details>h2 {
            display: inline-block;
        }

        .details progress {
            width: 60%;
        }
        
        .details a {
            float: right;
            text-decoration: underline;
            font-family: 宋体;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <header>
        <img src="images/miracle-nobg.ico">
        <h1 style="display: inline-block;">奇迹工作室&nbsp;<wbr />Miracle&nbsp;Studio</h1>
    </header>
    <div id="content">
        <nav>
            <a href="index.html">首页</a>
            <a href="info.html">关于我们</a>
            <a href="charactors.html">成员</a>
            <a href="works.html">作品</a>
            <a href="activities.html">动态</a>
            <a href="others.html">其他</a>
        </nav>
        <div id="main">
            <h1>作品</h1>
            <div id="done">
                <h2>已出版</h2>
                <div class="details">
                    <h2>《七八奇事》</h2>
                    <a href="works/01.html">点击查看详情</a>
                </div>
            </div>
            <div id="finishing">
                <h2>编写中</h2>
                <div class="details">
                    <h2>《阳王朝》</h2>
                    <br />
                    <progress value="75" max="100"></progress>

                </div>
                <div class="details">
                    <h2>《究极生命体》</h2>

                </div>
                <div class="details">
                    <h2>《绝境反击》</h2>
                    <br />

                    <a href="javascript:void">点击查看详情</a>
                </div>
                <div class="details">

                    <br />
                    <progress value="5" max="100"></progress>
                    <a href="javascript:void">点击查看详情</a>
                </div>
            </div>
        </div>
    </div>
